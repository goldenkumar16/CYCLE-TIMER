<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Timer - Color Coded</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --qc-load: #2563eb; --qc-disch: #7c3aed; --rtg-load: #0891b2; --rtg-disch: #db2777; --bg: #f1f5f9; --step-off: #cbd5e1; --success: #16a34a; --danger: #ef4444; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; }
        .screen { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: none; padding: 20px; box-sizing: border-box; }
        .active { display: block; }

        /* Dashboard */
        .home-header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .menu-card { padding: 30px; border-radius: 20px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.4rem; font-weight: 800; }
        
        /* Timer UI */
        .back-btn { background: #eee; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .section-card { border-top: 8px solid #ccc; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .timer-container { background: #1e293b; color: #38bdf8; padding: 20px; border-radius: 12px; text-align: center; margin: 15px 0; }
        .timer { font-size: 3.5rem; font-weight: 800; font-family: monospace; }
        
        /* Toggle Styling */
        .mode-toggle { display: flex; gap: 5px; margin-bottom: 15px; background: #f1f5f9; padding: 5px; border-radius: 10px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; color: #64748b; background: transparent; }
        
        /* Dynamic Colors for Modes */
        .qc-load-active { background: var(--qc-load) !important; color: white !important; }
        .qc-disch-active { background: var(--qc-disch) !important; color: white !important; }
        .rtg-load-active { background: var(--rtg-load) !important; color: white !important; }
        .rtg-disch-active { background: var(--rtg-disch) !important; color: white !important; }

        /* Step Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-step { padding: 15px 5px; border: none; border-radius: 12px; font-size: 0.85rem; font-weight: 700; color: white; background: var(--step-off); cursor: pointer; min-height: 60px; }
        .finish { background: var(--success) !important; grid-column: span 2; }
        
        .muda-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; background: #e2e8f0; margin-bottom: 15px; cursor: pointer; }
        .muda-on { background: var(--danger) !important; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="home-header"><h1>Cycle Timer</h1><p>Select Equipment</p></div>
        <div class="menu-grid">
            <button class="menu-card" style="background:var(--qc-load)" onclick="showScreen('qc-screen')"><span>QUAY CRANE</span><i class="fas fa-ship"></i></button>
            <button class="menu-card" style="background:var(--rtg-load)" onclick="showScreen('rtg-screen')"><span>RTG CRANE</span><i class="fas fa-truck-loading"></i></button>
        </div>
    </div>

    <div id="qc-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')">← HOME</button>
        <div id="qc-card" class="section-card" style="border-top-color: var(--qc-load);">
            <div class="mode-toggle">
                <button id="qc-load-mode" class="mode-btn qc-load-active" onclick="setMode('QC', 'LOAD')">LOAD</button>
                <button id="qc-disch-mode" class="mode-btn" onclick="setMode('QC', 'DISCHARGE')">DISCHARGE</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px;">
                <input type="text" id="qcStaffId" placeholder="Staff ID">
                <input type="text" id="qcNo" placeholder="QC #">
            </div>
            <div class="timer-container"><div class="timer" id="qc-timer">0.00</div></div>
            <button id="qc-muda" class="muda-btn" onclick="toggleMuda('QC')" disabled>PAUSE (MUDA)</button>
            <div id="qc-btns" class="btn-grid"></div>
            <button class="mode-btn" onclick="downloadReport('QC')" style="width:100%; margin-top:20px; background:#334155; color:white;">DOWNLOAD QC REPORT</button>
        </div>
    </div>

    <div id="rtg-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')">← HOME</button>
        <div id="rtg-card" class="section-card" style="border-top-color: var(--rtg-load);">
            <div class="mode-toggle">
                <button id="rtg-load-mode" class="mode-btn rtg-load-active" onclick="setMode('RTG', 'LOAD')">LOAD</button>
                <button id="rtg-disch-mode" class="mode-btn" onclick="setMode('RTG', 'DISCHARGE')">DISCHARGE</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px;">
                <input type="text" id="rtgStaffId" placeholder="Staff ID">
                <input type="text" id="rtgNo" placeholder="RTG #">
            </div>
            <div class="timer-container"><div class="timer" id="rtg-timer">0.00</div></div>
            <button id="rtg-muda" class="muda-btn" onclick="toggleMuda('RTG')" disabled>PAUSE (MUDA)</button>
            <div id="rtg-btns" class="btn-grid"></div>
            <button class="mode-btn" onclick="downloadReport('RTG')" style="width:100%; margin-top:20px; background:#334155; color:white;">DOWNLOAD RTG REPORT</button>
        </div>
    </div>

<script>
    let masterLogs = [];
    let state = {
        QC: { mode: 'LOAD', startTime: null, lastTime: null, interval: null, isPaused: false, mudaStart: null, totalMuda: 0, currentCycle: {} },
        RTG: { mode: 'LOAD', startTime: null, lastTime: null, interval: null, isPaused: false, mudaStart: null, totalMuda: 0, currentCycle: {} }
    };

    const config = {
        QC: {
            LOAD: ["Park to Truck", "Truck to Lock", "Lock to Sill", "Sill to Vessel", "Vessel to Unlock", "Unlock to Park"],
            DISCHARGE: ["Park to Vessel", "Vessel to Lock", "Lock to Sill", "Sill to Truck", "Truck to Unlock", "Unlock to Park"]
        },
        RTG: {
            LOAD: ["Standby to Lock (Bay)", "Lock to Standby", "Standby to Unlock (Trk)", "Unlock to Standby"],
            DISCHARGE: ["Park to Lock (Bay)", "Lock (Trk) to Unlock (Bay)", "Unlock (Bay) to Trk Line", "Trk Line to Park"]
        }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id !== 'home-screen') render(id.split('-')[0].toUpperCase());
    }

    function setMode(crane, mode) {
        if(state[crane].startTime) return;
        state[crane].mode = mode;
        const prefix = crane.toLowerCase();
        
        // Update Toggle Visuals
        document.getElementById(`${prefix}-load-mode`).className = `mode-btn ${mode==='LOAD' ? prefix+'-load-active' : ''}`;
        document.getElementById(`${prefix}-disch-mode`).className = `mode-btn ${mode==='DISCHARGE' ? prefix+'-disch-active' : ''}`;
        
        // Update Card Border
        const cardColor = mode === 'LOAD' ? `var(--${prefix}-load)` : `var(--${prefix}-disch)`;
        document.getElementById(`${prefix}-card`).style.borderTopColor = cardColor;
        
        render(crane);
    }

    function render(crane) {
        const container = document.getElementById(crane.toLowerCase() + '-btns');
        container.innerHTML = '';
        const mode = state[crane].mode;
        const btnColor = `var(--${crane.toLowerCase()}-${mode.toLowerCase()})`;
        
        config[crane][mode].forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-step' + (i === config[crane][mode].length - 1 ? ' finish' : '');
            btn.disabled = i !== 0;
            btn.id = `${crane}-s${i+1}`;
            btn.innerText = (i+1) + ". " + text;
            btn.onclick = () => triggerStep(crane, i + 1);
            if(i === 0) btn.style.background = btnColor;
            container.appendChild(btn);
        });
    }

    function triggerStep(crane, stepNum) {
        const now = Date.now();
        const s = state[crane];
        const mode = s.mode;
        const steps = config[crane][mode];
        const color = `var(--${crane.toLowerCase()}-${mode.toLowerCase()})`;

        if (stepNum === 1) {
            s.startTime = now;
            s.totalMuda = 0;
            s.currentCycle = { Date: new Date().toLocaleDateString(), Equipment: crane, Unit: document.getElementById(crane.toLowerCase() + 'No').value, Staff: document.getElementById(crane.toLowerCase() + 'StaffId').value, Mode: mode };
            document.getElementById(crane.toLowerCase() + '-muda').disabled = false;
            s.interval = setInterval(() => {
                document.getElementById(crane.toLowerCase()+'-timer').innerText = ((Date.now() - s.startTime)/1000).toFixed(2);
            }, 50);
        } else {
            s.currentCycle['Step_'+(stepNum-1)] = ((now - s.lastTime) / 1000).toFixed(2);
        }

        if (stepNum === steps.length) {
            clearInterval(s.interval);
            s.currentCycle['MUDA'] = s.totalMuda.toFixed(2);
            s.currentCycle['Total'] = ((now - s.startTime) / 1000).toFixed(2);
            masterLogs.push({...s.currentCycle});
            document.getElementById(crane.toLowerCase() + '-muda').disabled = true;
            setTimeout(() => resetCrane(crane), 1200);
        } else {
            for(let i=1; i<=steps.length; i++) document.getElementById(`${crane}-s${i}`).disabled = true;
            const next = document.getElementById(`${crane}-s${stepNum+1}`);
            next.disabled = false;
            next.style.background = color;
        }
        s.lastTime = now;
    }

    function toggleMuda(crane) {
        const s = state[crane];
        const btn = document.getElementById(crane.toLowerCase() + '-muda');
        if (!s.isPaused) {
            s.isPaused = true;
            s.mudaStart = Date.now();
            btn.classList.add('muda-on');
            clearInterval(s.interval);
        } else {
            s.isPaused = false;
            s.totalMuda += (Date.now() - s.mudaStart) / 1000;
            s.startTime += (Date.now() - s.mudaStart);
            s.lastTime += (Date.now() - s.mudaStart);
            btn.classList.remove('muda-on');
            s.interval = setInterval(() => {
                document.getElementById(crane.toLowerCase()+'-timer').innerText = ((Date.now() - s.startTime)/1000).toFixed(2);
            }, 50);
        }
    }

    function resetCrane(crane) {
        state[crane].startTime = null;
        document.getElementById(crane.toLowerCase()+'-timer').innerText = "0.00";
        render(crane);
    }

    function downloadReport(type) {
        const filtered = masterLogs.filter(log => log.Equipment === type);
        if (filtered.length === 0) return alert("No data recorded.");
        const csv = "data:text/csv;charset=utf-8," + Object.keys(filtered[0]).join(",") + "\n" + filtered.map(r => Object.values(r).join(",")).join("\n");
        const link = document.createElement("a");
        link.href = encodeURI(csv);
        link.download = `${type}_Report.csv`;
        link.click();
    }

    updateDateDisplays = () => {}; // Dummy to prevent error if called
    render('QC');
</script>
</body>
</html>
