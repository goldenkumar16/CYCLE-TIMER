<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Timer - Orange Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --orange: #ff9800; /* Main button color */
            --white: #ffffff; /* Font color */
            --gray-active: #546e7a; /* Color when step is selected */
            --bg: #f1f5f9; 
            --success: #2e7d32; 
            --danger: #ef4444; 
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; }
        .screen { width: 100%; max-width: 500px; min-height: 100vh; background: white; display: none; padding: 20px; box-sizing: border-box; }
        .active { display: block; }

        /* Dashboard */
        .home-header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .menu-card { padding: 30px; border-radius: 20px; border: none; color: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 1.4rem; font-weight: 800; background: var(--orange); }
        
        /* Timer UI */
        .back-btn { background: #eee; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .section-card { border-top: 8px solid var(--orange); padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .timer-container { background: #1e293b; color: #38bdf8; padding: 20px; border-radius: 12px; text-align: center; margin: 15px 0; }
        .timer { font-size: 3.5rem; font-weight: 800; font-family: monospace; }
        
        /* Step Buttons Styling */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-step { 
            padding: 15px 5px; 
            border: none; 
            border-radius: 12px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--white); 
            background: var(--orange); /* Default Orange */
            cursor: pointer; 
            min-height: 60px; 
            transition: background 0.2s;
        }
        
        /* When the step is active/selected, it turns Gray */
        .step-active { background: var(--gray-active) !important; color: white !important; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        .btn-step:disabled { opacity: 0.4; cursor: not-allowed; }
        .finish { background: var(--success) !important; grid-column: span 2; }
        
        .muda-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; background: #e2e8f0; margin-bottom: 15px; cursor: pointer; }
        .muda-on { background: var(--danger) !important; color: white; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="home-header"><h1>Cycle Timer</h1><p>Select Equipment</p></div>
        <div class="menu-grid">
            <button class="menu-card" onclick="showScreen('qc-screen')"><span>QUAY CRANE</span><i class="fas fa-ship"></i></button>
            <button class="menu-card" style="background:#0891b2" onclick="showScreen('rtg-screen')"><span>RTG CRANE</span><i class="fas fa-truck-loading"></i></button>
        </div>
    </div>

    <div id="qc-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')">← HOME</button>
        <div class="section-card">
            <h2 style="margin-top:0">QC Timer</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px;">
                <input type="text" id="qcStaffId" placeholder="Staff ID" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <input type="text" id="qcNo" placeholder="QC #" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
            </div>
            <div class="timer-container"><div class="timer" id="qc-timer">0.00</div></div>
            <button id="qc-muda" class="muda-btn" onclick="toggleMuda('QC')" disabled>PAUSE (MUDA)</button>
            <div id="qc-btns" class="btn-grid"></div>
            <button class="muda-btn" onclick="downloadReport('QC')" style="margin-top:20px; background:#334155; color:white;">DOWNLOAD QC REPORT</button>
        </div>
    </div>

    <div id="rtg-screen" class="screen">
        <button class="back-btn" onclick="showScreen('home-screen')">← HOME</button>
        <div class="section-card" style="border-top-color:#0891b2">
            <h2 style="margin-top:0">RTG Timer</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px;">
                <input type="text" id="rtgStaffId" placeholder="Staff ID" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <input type="text" id="rtgNo" placeholder="RTG #" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
            </div>
            <div class="timer-container"><div class="timer" id="rtg-timer">0.00</div></div>
            <button id="rtg-muda" class="muda-btn" onclick="toggleMuda('RTG')" disabled>PAUSE (MUDA)</button>
            <div id="rtg-btns" class="btn-grid"></div>
            <button class="muda-btn" onclick="downloadReport('RTG')" style="margin-top:20px; background:#334155; color:white;">DOWNLOAD RTG REPORT</button>
        </div>
    </div>

<script>
    let masterLogs = [];
    let state = {
        QC: { mode: 'LOAD', startTime: null, lastTime: null, interval: null, isPaused: false, mudaStart: null, totalMuda: 0 },
        RTG: { mode: 'LOAD', startTime: null, lastTime: null, interval: null, isPaused: false, mudaStart: null, totalMuda: 0 }
    };

    const config = {
        QC: ["Park to Truck", "Truck to Lock", "Lock to Sill", "Sill to Vessel", "Vessel to Unlock", "Unlock to Park"],
        RTG: ["Standby to Lock (Bay)", "Lock to Standby", "Standby to Unlock (Trk)", "Unlock to Standby"]
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render(id.split('-')[0].toUpperCase());
    }

    function render(crane) {
        const container = document.getElementById(crane.toLowerCase() + '-btns');
        container.innerHTML = '';
        config[crane].forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-step' + (i === config[crane].length - 1 ? ' finish' : '');
            btn.disabled = i !== 0;
            btn.id = `${crane}-s${i+1}`;
            btn.innerText = (i+1) + ". " + text;
            btn.onclick = () => triggerStep(crane, i + 1);
            // Highlight the first button as orange initially
            container.appendChild(btn);
        });
    }

    function triggerStep(crane, stepNum) {
        const now = Date.now();
        const s = state[crane];
        const totalSteps = config[crane].length;

        if (stepNum === 1) {
            s.startTime = now;
            s.totalMuda = 0;
            s.currentCycle = { Date: new Date().toLocaleDateString(), Equipment: crane, Unit: document.getElementById(crane.toLowerCase() + 'No').value, Staff: document.getElementById(crane.toLowerCase() + 'StaffId').value };
            document.getElementById(crane.toLowerCase() + '-muda').disabled = false;
            s.interval = setInterval(() => {
                document.getElementById(crane.toLowerCase()+'-timer').innerText = ((Date.now() - s.startTime)/1000).toFixed(2);
            }, 50);
        } else {
            s.currentCycle['Step_'+(stepNum-1)] = ((now - s.lastTime) / 1000).toFixed(2);
        }

        // Handle button colors
        for(let i=1; i<=totalSteps; i++) {
            const btn = document.getElementById(`${crane}-s${i}`);
            btn.disabled = true;
            btn.classList.remove('step-active');
        }

        if (stepNum === totalSteps) {
            clearInterval(s.interval);
            s.currentCycle['Total'] = ((now - s.startTime) / 1000).toFixed(2);
            masterLogs.push({...s.currentCycle});
            document.getElementById(crane.toLowerCase() + '-muda').disabled = true;
            setTimeout(() => resetCrane(crane), 1200);
        } else {
            const next = document.getElementById(`${crane}-s${stepNum+1}`);
            next.disabled = false;
            next.classList.add('step-active'); // Turn active step GRAY
        }
        s.lastTime = now;
    }

    function toggleMuda(crane) {
        const s = state[crane];
        const btn = document.getElementById(crane.toLowerCase() + '-muda');
        if (!s.isPaused) {
            s.isPaused = true;
            s.mudaStart = Date.now();
            btn.classList.add('muda-on');
            clearInterval(s.interval);
        } else {
            s.isPaused = false;
            s.startTime += (Date.now() - s.mudaStart);
            s.lastTime += (Date.now() - s.mudaStart);
            btn.classList.remove('muda-on');
            s.interval = setInterval(() => {
                document.getElementById(crane.toLowerCase()+'-timer').innerText = ((Date.now() - s.startTime)/1000).toFixed(2);
            }, 50);
        }
    }

    function resetCrane(crane) {
        state[crane].startTime = null;
        document.getElementById(crane.toLowerCase()+'-timer').innerText = "0.00";
        render(crane);
    }

    function downloadReport(type) {
        const filtered = masterLogs.filter(log => log.Equipment === type);
        if (filtered.length === 0) return alert("No data.");
        const csv = "data:text/csv;charset=utf-8," + Object.keys(filtered[0]).join(",") + "\n" + filtered.map(r => Object.values(r).join(",")).join("\n");
        const link = document.createElement("a");
        link.href = encodeURI(csv);
        link.download = `${type}_Report.csv`;
        link.click();
    }
</script>
</body>
